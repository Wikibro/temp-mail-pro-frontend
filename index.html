    <style>
      :root {
        --primary: #4361ee;
        --secondary: #3a0ca3;
        --accent: #f72585;
        --light: #f8f9fa;
        --dark: #212529;
      }
      
      body {
        font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      
      .brand-highlight {
        color: var(--accent);
      }
      
      .navbar {
        background-color: var(--primary);
      }
      
      .hero-section {
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: white;
        padding: 100px 0;
      }

      @media (max-width: 576px) {
        .hero-section {
          padding: 64px 0;
        }
      }
      
      .cta-button {
        background-color: var(--accent);
        color: white;
        padding: 12px 24px;
        border-radius: 30px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      
      .cta-button:hover {
        background-color: #e51276;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      }
      
      .feature-icon {
        width: 70px;
        height: 70px;
        background: rgba(67, 97, 238, 0.1);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        font-size: 28px;
        color: var(--primary);
      }
      
      .feature-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        transition: transform 0.3s ease;
      }
      
      .feature-card:hover {
        transform: translateY(-5px);
      }
      
      .section-title {
        position: relative;
        padding-bottom: 15px;
      }
      
      .section-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 4px;
        background: var(--primary);
        border-radius: 2px;
      }
      
      .promo-image {
        max-width: 100%;
        height: auto;
        border-radius: 10px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      }
      
      /* Critical Performance Optimizations */
      
      /* Improve badge contrast for accessibility - use darker opaque backgrounds */
      .badge.bg-info.bg-opacity-10.text-info {
        background-color: #004085 !important;
        color: white !important;
      }
      
      .badge.bg-success.bg-opacity-10.text-success {
        background-color: #155724 !important;
        color: white !important;
      }
      
      .badge.bg-primary.bg-opacity-10.text-primary {
        background-color: #004085 !important;
        color: white !important;
      }
      
      .badge.bg-danger.bg-opacity-10.text-danger {
        background-color: #721c24 !important;
        color: white !important;
      }
      
      .badge.bg-warning.bg-opacity-10.text-warning {
        background-color: #664d03 !important;
        color: white !important;
      }
      
      /* Improve touch target size for all buttons and interactive elements */
      .btn, .badge {
        min-height: 44px;
        min-width: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      
      /* Ensure focus indicators are visible */
      .btn:focus, .badge:focus, a:focus {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
      }
      
      /* Prevent FOUC (Flash of Unstyled Content) */
      html {
        background: white;
      }
      
      /* Optimize hero section rendering */
      .hero-section {
        contain: layout style paint;
      }
      
      /* Critical path optimization: Load only essential fonts */
      body {
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Remove unused font weights during initial load */
      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
